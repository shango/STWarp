# Railway build/deploy config for the STWarp web app.
# Build context is the repo root so both `stwarp/` and `web/` are
# available to the Dockerfile.

[build]
builder = "DOCKERFILE"
dockerfilePath = "web/Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
